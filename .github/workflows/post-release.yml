name: post-release
on:
  release:
    types:
      - published

jobs:
  post_release:
    permissions:
      issues: write
      pull-requests: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: apexskier/github-release-commenter@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          comment-template: |
            🚀 This is included in version {release_link}
